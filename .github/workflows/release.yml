name: Release

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name }}
    
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        echo "TAG=${TAG}" >> $GITHUB_OUTPUT
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Build
      run: npm run build
      env:
        BUILD_HASH: ${{ github.sha }}
        BUILD_TIME: ${{ github.event.head_commit.timestamp }}
    
    - name: Verify build artifacts
      run: |
        test -f server/dist/index.js || { echo "ERROR: server/dist/index.js not found"; exit 1; }
        test -f client/dist/index.html || { echo "ERROR: client/dist/index.html not found"; exit 1; }
        test -d server/dist/client || { echo "ERROR: server/dist/client/ not found"; exit 1; }
        test -f server/dist/client/index.html || { echo "ERROR: server/dist/client/index.html not found"; exit 1; }
        echo "✓ Build artifacts verified"
    
    - name: Assemble release artifact
      run: |
        RELEASE_NAME="camillaeq-${{ steps.version.outputs.VERSION }}"
        RELEASE_DIR="release/${RELEASE_NAME}"
        
        echo "Assembling release: ${RELEASE_NAME}"
        mkdir -p "${RELEASE_DIR}"
        
        # Copy server build output (preserve dist/ directory structure)
        mkdir -p "${RELEASE_DIR}/server"
        cp -r server/dist "${RELEASE_DIR}/server/dist"
        
        # Copy data directory (configs, presets)
        cp -r server/data "${RELEASE_DIR}/data/"
        
        # Copy deployment resources
        mkdir -p "${RELEASE_DIR}/deploy"
        cp -r deploy/systemd "${RELEASE_DIR}/deploy/"
        cp -r deploy/caddy "${RELEASE_DIR}/deploy/"
        
        # Copy tools
        cp -r tools "${RELEASE_DIR}/"
        
        # Copy shared modules (if any runtime code depends on them)
        cp -r shared "${RELEASE_DIR}/"
        
        # Copy LICENSE and README for release
        cp LICENSE "${RELEASE_DIR}/"
        
        echo "✓ Files copied to ${RELEASE_DIR}"
        
        # Debug: Show release directory structure
        echo "Release directory structure:"
        ls -la "${RELEASE_DIR}/server/" || echo "WARNING: server/ directory not found"
        test -f "${RELEASE_DIR}/server/dist/index.js" && echo "✓ server/dist/index.js exists" || echo "ERROR: server/dist/index.js NOT found"
    
    - name: Generate runtime package.json
      run: |
        RELEASE_NAME="camillaeq-${{ steps.version.outputs.VERSION }}"
        RELEASE_DIR="release/${RELEASE_NAME}"
        
        # Extract runtime dependencies from server/package.json
        cat > "${RELEASE_DIR}/package.json" << 'EOF'
        {
          "name": "camillaeq",
          "version": "${{ steps.version.outputs.VERSION }}",
          "description": "CamillaDSP graphical equalizer interface",
          "type": "module",
          "scripts": {
            "start": "node server/dist/index.js"
          },
          "dependencies": {
            "@fastify/static": "^7.0.4",
            "dotenv": "^16.4.1",
            "fastify": "^4.26.0",
            "pino": "^8.19.0",
            "pino-pretty": "^10.3.1",
            "ws": "^8.19.0"
          },
          "engines": {
            "node": ">=18.0.0 <25.0.0",
            "npm": ">=9.0.0"
          }
        }
        EOF
        
        # Replace version placeholder
        sed -i "s/\${{ steps.version.outputs.VERSION }}/${{ steps.version.outputs.VERSION }}/g" "${RELEASE_DIR}/package.json"
        
        echo "✓ Generated runtime package.json"
        cat "${RELEASE_DIR}/package.json"
    
    - name: Generate package-lock.json and install dependencies
      run: |
        RELEASE_NAME="camillaeq-${{ steps.version.outputs.VERSION }}"
        RELEASE_DIR="release/${RELEASE_NAME}"
        
        cd "${RELEASE_DIR}"
        
        # Generate package-lock.json
        npm install --package-lock-only --omit=dev
        
        # Validate by installing
        npm ci --omit=dev
        
        echo "✓ Dependencies installed and validated"
        echo "✓ node_modules size: $(du -sh node_modules | cut -f1)"
    
    - name: Smoke test the artifact
      run: |
        RELEASE_NAME="camillaeq-${{ steps.version.outputs.VERSION }}"
        RELEASE_DIR="release/${RELEASE_NAME}"
        
        cd "${RELEASE_DIR}"
        
        # Use ephemeral port to avoid EADDRINUSE collisions
        TEST_PORT=$(node -e "require('net').createServer().listen(0, function() { console.log(this.address().port); this.close(); })")
        echo "Using ephemeral port: ${TEST_PORT}"
        
        # Start server in background with production config
        NODE_ENV=production SERVER_PORT=${TEST_PORT} SERVER_HOST=127.0.0.1 node server/dist/index.js > server.log 2>&1 &
        SERVER_PID=$!
        
        echo "Started server (PID: ${SERVER_PID})"
        
        # Helper to check if server is still running
        check_server_alive() {
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "ERROR: Server process exited unexpectedly"
            echo "Server logs:"
            cat server.log
            exit 1
          fi
        }
        
        # Wait for server to be ready (max 10 seconds)
        for i in {1..20}; do
          check_server_alive
          if curl -s http://127.0.0.1:${TEST_PORT}/health > /dev/null 2>&1; then
            echo "✓ Server responded to health check"
            break
          fi
          if [ $i -eq 20 ]; then
            echo "ERROR: Server did not respond within 10 seconds"
            echo "Server logs:"
            cat server.log
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          sleep 0.5
        done
        
        # Test 1: Root serves HTML
        echo "Testing: GET /"
        check_server_alive
        RESPONSE=$(curl -s http://127.0.0.1:${TEST_PORT}/)
        if echo "$RESPONSE" | grep -q '<div id="app">'; then
          echo "✓ Root serves UI (HTML with #app)"
        else
          echo "ERROR: Root did not return expected HTML"
          echo "Response preview: ${RESPONSE:0:200}"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        fi
        
        # Test 2: API endpoint returns JSON
        echo "Testing: GET /api/version"
        check_server_alive
        RESPONSE=$(curl -s http://127.0.0.1:${TEST_PORT}/api/version)
        if echo "$RESPONSE" | grep -q '"version"'; then
          echo "✓ API endpoint returns JSON"
        else
          echo "ERROR: API endpoint did not return expected JSON"
          echo "Response: ${RESPONSE}"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        fi
        
        # Test 3: SPA fallback for unknown routes
        echo "Testing: GET /some-ui-route (SPA fallback)"
        check_server_alive
        RESPONSE=$(curl -s http://127.0.0.1:${TEST_PORT}/some-ui-route)
        if echo "$RESPONSE" | grep -q '<div id="app">'; then
          echo "✓ SPA fallback works"
        else
          echo "ERROR: SPA fallback did not return HTML"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        fi
        
        # Test 4: Unknown API route returns JSON 404
        echo "Testing: GET /api/nonexistent (JSON 404)"
        check_server_alive
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:${TEST_PORT}/api/nonexistent)
        if [ "$HTTP_CODE" = "404" ]; then
          echo "✓ Unknown API route returns 404"
        else
          echo "ERROR: Unknown API route returned HTTP $HTTP_CODE (expected 404)"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        fi
        
        # Clean up
        kill $SERVER_PID 2>/dev/null || true
        wait $SERVER_PID 2>/dev/null || true
        
        echo "✓ All smoke tests passed"
    
    - name: Create tarball
      run: |
        TAG="${{ steps.version.outputs.TAG }}"
        
        cd release
        tar -czf "camillaeq-${TAG}.tar.gz" "camillaeq-${{ steps.version.outputs.VERSION }}/"
        
        echo "✓ Created release tarball"
        ls -lh "camillaeq-${TAG}.tar.gz"
        
        # Move to root for upload
        mv "camillaeq-${TAG}.tar.gz" ../
    
    - name: Upload tarball to release
      run: |
        TAG="${{ steps.version.outputs.TAG }}"
        
        echo "Uploading camillaeq-${TAG}.tar.gz to release ${TAG}"
        gh release upload "${TAG}" "camillaeq-${TAG}.tar.gz" --clobber
        
        echo "✓ Tarball uploaded successfully"
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
